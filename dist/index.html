<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Timeline Helper</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' filesystem: https:;">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    html, body { margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#2b2b2b; color:#ddd; }
    .wrap { padding: 12px; display: grid; gap: 10px; }
    h1 { font-size: 14px; margin: 0 0 6px 0; font-weight: 600; color:#cfcfcf; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; overflow: visible; margin-bottom: 8px; }
    .row-small { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .row-small button { width:32px; height:32px; border-radius:6px; }
    .row-small .icon { width:14px; height:14px; }
    button { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #4a4a4a; background: #3a3a3a; cursor: pointer; box-shadow: inset 0 1px 0 #2a2a2a; }
    button:hover { background:#454545; border-color:#5a5a5a; }
    button:active { background:#515151; }
    .icon { width: 20px; height: 20px; color: #dddddd; }
    .small { font-size: 12px; color: #a8a8a8; }
    .status { min-height: 36px; font-size: 12px; color: #e0e0e0; white-space: pre-wrap; line-height: 1.35; }
    .footer { border-top: 1px solid #3a3a3a; padding-top: 8px; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    .grid9 { display:grid; grid-template-columns: repeat(3, 44px); gap: 6px; align-items:center; }
    .options { display:flex; align-items:center; gap:8px; color:#bdbdbd; font-size:12px; }
    .btn-toggle { position: relative; }
    .btn-toggle.active { background:#565656; border-color:#9a9a9a; box-shadow: inset 0 2px 0 #2a2a2a, 0 0 0 2px rgba(255,255,255,0.04); }
    .btn-toggle:not(.active) { opacity: 0.85; }
    .matrix-group { border:1px solid #3a3a3a; border-radius:10px; padding:10px; background:#2f2f2f; display:grid; gap:8px; overflow: visible; }
    .matrix-toolbar { display:flex; gap:6px; align-items:center; justify-content:center; border-bottom:1px solid #3a3a3a; padding-bottom:8px; overflow: visible; }
    .matrix-toolbar .btn-toggle { width:32px; height:32px; border-radius:6px; }
    .matrix-toolbar .icon { width:14px; height:14px; }
    .matrix-grid { display:grid; grid-template-columns: repeat(3, 36px); gap: 6px; align-items:center; justify-content:center; }
    .matrix-grid button { width:36px; height:36px; }
    .matrix-grid .icon { width:16px; height:16px; }
    .matrix-sep { width:8px; height:1px; background:transparent; }
    .inline-mini { display:flex; align-items:center; gap:6px; padding:4px 6px; border:1px solid #3a3a3a; border-radius:8px; background:#333333; margin-left:4px; }
    .inline-mini .btn-toggle { width:32px; height:32px; border-radius:6px; }
    .inline-mini .icon { width:14px; height:14px; }
    .btn-stack { display:flex; flex-direction:column; gap:0; height:32px; }
    .btn-stack .btn-toggle { width:32px; height:16px; border-radius:4px; padding:0; }
    .btn-stack .btn-toggle:first-child { border-bottom-left-radius:4px; border-bottom-right-radius:4px; border-bottom-color:#414141; }
    .btn-stack .btn-toggle:last-child { border-top-left-radius:4px; border-top-right-radius:4px; border-top-color:#414141; }
    button[data-tip] { position: relative; }
    /* Отключаем CSS-псевдо-тултипы, если активна JS-система */
    body.use-js-tooltips button[data-tip]::after, body.use-js-tooltips button[data-tip]::before { content: none; }
    /* Базовые CSS тултипы (fallback), когда JS недоступен */
    button[data-tip]::after { content: attr(data-tip); position: absolute; left: 50%; bottom: calc(100% + 12px); transform: translateX(-50%); background:#121212; color:#eaeaea; padding:4px 6px; border:1px solid #444; border-radius:6px; font-size:11px; white-space:normal; max-width: 360px; word-break: normal; overflow-wrap: break-word; hyphens: auto; line-height: 1.2; opacity:0; pointer-events:none; transition: opacity .12s ease, transform .12s ease; z-index:10000; }
    button[data-tip]::before { content: ''; position: absolute; left:50%; bottom: calc(100% + 4px); transform: translateX(-50%) rotate(45deg); width:8px; height:8px; background:#121212; border-left:1px solid #444; border-bottom:1px solid #444; opacity:0; transition: opacity .12s ease; z-index:10000; }
    button[data-tip]:hover::after, button[data-tip]:focus::after { opacity:1; transform: translateX(-50%) translateY(-6px); }
    button[data-tip]:hover::before, button[data-tip]:focus::before { opacity:1; }
    /* JS тултип */
    #app-tooltip { position: fixed; top:0; left:0; pointer-events:none; z-index:2147483647; background:rgba(18,18,18,0.82); color:#eaeaea; border:1px solid rgba(68,68,68,0.7); border-radius:3px; padding:2px 4px; font-size:9px; line-height:1.1; max-width: 240px; box-shadow: 0 3px 9px rgba(0,0,0,0.28); display:none; }
    /* Tooltip at bottom variant */
    button[data-tip][data-tip-pos="bottom"]::after { top: calc(100% + 8px); bottom: auto; }
    button[data-tip][data-tip-pos="bottom"]::before { top: calc(100% + 4px); bottom: auto; transform: translateX(-50%) rotate(45deg); border-left:1px solid #444; border-bottom:1px solid #444; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Timeline Helper</h1>
    <div class="row">
      <button id="swapToDup" aria-label="Заменить на дубликат символа" data-tip="Заменить все ключи на один дубликат символа" data-tip-pos="bottom">
        <i data-lucide="refresh-cw" class="icon"></i>
      </button>
      
      <div class="inline-mini">
        <button id="dupLayerGuideBitmap" class="btn-toggle" aria-label="Дублировать слой→guide, копию→bitmap" data-tip="Дублировать слой, оригинал сделать guide/скрыть, копию конвертировать в bitmap" data-tip-pos="bottom">
          <i data-lucide="copy" class="icon"></i>
        </button>
        <div class="btn-stack">
          <button id="rebuildBitmapSmall" class="btn-toggle" aria-label="Пересобрать bitmap из базового слоя (+25%)" data-tip="Увеличить качество bitmap на 25%" data-tip-pos="bottom">
            <i data-lucide="plus" class="icon"></i>
          </button>
          <button id="rebuildBitmapSmallMinus" class="btn-toggle" aria-label="Пересобрать bitmap из базового слоя (-25%)" data-tip="Уменьшить качество bitmap на 25%" data-tip-pos="bottom">
            <i data-lucide="minus" class="icon"></i>
          </button>
        </div>
      </div>
      <!-- <button id="convertLayerToBitmap" aria-label="Конвертировать слой в Bitmap" data-tip="Конвертировать активный слой в Bitmap по ключам" data-tip-pos="bottom">
        <i data-lucide="image" class="icon"></i>
      </button> -->
      <!-- <button id="listParents" aria-label="Показать иерархию символов" data-tip="Показать иерархию (родительские) символы выделенного экземпляра" data-tip-pos="bottom">
        <i data-lucide="list-tree" class="icon"></i>
      </button> -->
    </div>
    <div class="row-small">
      <button id="createOverlayLayer" aria-label="Создать DOM Overlay Border" data-tip="Создать верхний слой с Actions для рамки dom_overlay_container" data-tip-pos="bottom">
        <i data-lucide="square" class="icon"></i>
      </button>
      <button id="toggleTextCase" aria-label="Сменить регистр текста" data-tip="Сменить регистр текста (цикл: lowercase → UPPERCASE → Sentence case)" data-tip-pos="bottom">
        <i data-lucide="case-sensitive" class="icon"></i>
      </button>
      <button id="createLoopLimiterLayer" aria-label="Создать Loop Limiter" data-tip="Создать верхний слой и записать loopLimiter в текущий кадр" data-tip-pos="bottom">
        <i data-lucide="timer" class="icon"></i>
      </button>
      <button id="openBitmapInAi" aria-label="Открыть bitmap в Illustrator" data-tip="Открыть первый bitmap текущего ключа в Adobe Illustrator" data-tip-pos="bottom">
        <i data-lucide="external-link" class="icon"></i>
      </button>
      <button id="createBitmapMask" aria-label="Создать маску для Bitmap" data-tip="Создать shape-маску по границам bitmap на текущем кадре" data-tip-pos="bottom">
        <i data-lucide="crop" class="icon"></i>
      </button>
    </div>
    <div class="matrix-group">
      <div class="matrix-toolbar">
        <button id="anchor-apply-all" class="btn-toggle" aria-label="Применять ко всем ключам" aria-pressed="true" data-tip="Применять ко всем ключам слоя">
          <i data-lucide="layers" class="icon"></i>
        </button>
        <button id="anchor-s0" class="btn-toggle" aria-label="Анчор в нулевые координаты" data-tip="Сцена (0,0)">
          <i data-lucide="locate" class="icon"></i>
        </button>
      </div>
      <div class="matrix-grid">
        <button id="anchor-tl" aria-label="Верх-лево"><i data-lucide="corner-left-up" class="icon"></i></button>
        <button id="anchor-tc" aria-label="Верх-центр"><i data-lucide="arrow-up" class="icon"></i></button>
        <button id="anchor-tr" aria-label="Верх-право"><i data-lucide="corner-right-up" class="icon"></i></button>
        <button id="anchor-ml" aria-label="Середина-лево"><i data-lucide="arrow-left" class="icon"></i></button>
        <button id="anchor-cc" aria-label="Центр"><i data-lucide="crosshair" class="icon"></i></button>
        <button id="anchor-mr" aria-label="Середина-право"><i data-lucide="arrow-right" class="icon"></i></button>
        <button id="anchor-bl" aria-label="Низ-лево"><i data-lucide="corner-left-down" class="icon"></i></button>
        <button id="anchor-bc" aria-label="Низ-центр"><i data-lucide="arrow-down" class="icon"></i></button>
        <button id="anchor-br" aria-label="Низ-право"><i data-lucide="corner-right-down" class="icon"></i></button>
      </div>
    </div>
    <div class="options">
      <button id="runTraceOnce" class="btn-toggle" data-tip="Выполнить Image Trace (Illustrator)">
        <i data-lucide="wand-2" class="icon"></i>
      </button>
      <div class="inline-mini" style="margin-left:8px;">
        <label for="runTraceThreshold" class="small">threshold</label>
        <input id="runTraceThreshold" type="number" min="0" max="255" step="1" value="249" style="width:64px; height:24px; background:#2f2f2f; color:#ddd; border:1px solid #444; border-radius:6px; padding:0 6px;" />
      </div>
      <div class="inline-mini" style="margin-left:8px;">
        <label for="runTraceCleanWhite" class="small" style="display:flex; align-items:center; gap:4px; cursor:pointer;">
          <input id="runTraceCleanWhite" type="checkbox" style="width:16px; height:16px; cursor:pointer;" />
          <span>clean white</span>
        </label>
      </div>
    </div>
    <div class="row-small ai-only">
      <button id="shrinkTrace" class="btn-toggle" aria-label="Offset Path -0.5px" data-tip="Сузить вектор: Offset Path -0.5px">
        <i data-lucide="minus" class="icon"></i>
      </button>
      <button id="expandTrace" class="btn-toggle" aria-label="Offset Path +0.5px" data-tip="Расширить вектор: Offset Path +0.5px">
        <i data-lucide="plus" class="icon"></i>
      </button>
    </div>
    <div class="footer">
      <div class="status" id="status"></div>
      <div class="small">Панель вызывает JSFL-скрипты из папки <code>jsfl</code>.</div>
    </div>
  </div>

  <script src="./CSInterface.js"></script>
  <script src="./app.js"></script>
  <script>
    // Инициализация Lucide иконок после загрузки DOM
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
      // JS тултип поверх всего
      try {
        const root = document.body;
        const tip = document.createElement('div');
        tip.id = 'app-tooltip';
        root.appendChild(tip);
        document.body.classList.add('use-js-tooltips');
        let hideTid = null;
        function showTip(target){
          const text = target.getAttribute('data-tip');
          if (!text) return;
          tip.textContent = text;
          tip.style.display = 'block';
          const rect = target.getBoundingClientRect();
          const x = rect.left + rect.width/2;
          const y = rect.top - 10; // над кнопкой
          const pad = 8;
          tip.style.left = Math.max(8, Math.min(window.innerWidth - tip.offsetWidth - 8, x - tip.offsetWidth/2)) + 'px';
          tip.style.top = Math.max(8, y - tip.offsetHeight - pad) + 'px';
        }
        function hideTip(){ tip.style.display = 'none'; }
        document.addEventListener('mouseover', function(e){
          const t = e.target.closest && e.target.closest('button[data-tip]');
          if (t) { clearTimeout(hideTid); showTip(t); }
        });
        document.addEventListener('mouseout', function(e){
          const t = e.target.closest && e.target.closest('button[data-tip]');
          if (t) { hideTid = setTimeout(hideTip, 60); }
        });
        window.addEventListener('scroll', hideTip, true);
      } catch(e) {}
    });
  </script>
</body>
</html>
